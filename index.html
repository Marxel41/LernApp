<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitner Sheet - Schnelles Lernen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        [data-lucide] { display: inline-block; vertical-align: middle; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwsOgO9MCOz1Rmv7m1EVV26nl29H4RS2D4_KqBKCh_HmiZnnbDAu5V1EaxZEwnUzkX9/exec";

        const normalize = (data) => {
            if (!data || !Array.isArray(data)) return [];
            return data.map(item => {
                const normalizedItem = {};
                for (let key in item) {
                    normalizedItem[key.toLowerCase()] = item[key];
                    normalizedItem[key] = item[key];
                }
                return normalizedItem;
            });
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    const lucideName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    iconRef.current.setAttribute('data-lucide', lucideName);
                    lucide.createIcons();
                }
            }, [name, size]);
            return <i ref={iconRef} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const Button = ({ onClick, children, variant = 'primary', className = "", disabled = false }) => {
            const variants = {
                primary: 'bg-blue-600 text-white hover:bg-blue-700 shadow-md',
                secondary: 'bg-slate-200 text-slate-800 hover:bg-slate-300',
                danger: 'bg-red-100 text-red-600 hover:bg-red-200',
            };
            return (
                <button disabled={disabled} onClick={onClick} 
                    className={`px-4 py-2 rounded-lg font-bold transition-all active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2 ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('auth'); 
            const [lectures, setLectures] = useState([]);
            const [cards, setCards] = useState([]);
            const [progress, setProgress] = useState([]);
            const [currentLecture, setCurrentLecture] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [error, setError] = useState('');

            const refreshData = async (silent = false) => {
                if (!SCRIPT_URL) return;
                if (!silent) setLoading(true); else setIsSyncing(true);
                try {
                    const resp = await fetch(SCRIPT_URL);
                    const data = await resp.json();
                    setLectures(normalize(data.lectures));
                    setCards(normalize(data.cards));
                    setProgress(normalize(data.progress));
                } catch (e) {
                    console.error("Refresh failed", e);
                } finally {
                    setLoading(false);
                    setIsSyncing(false);
                }
            };

            const handleLogin = async (username, password) => {
                setError('');
                setLoading(true);
                try {
                    const resp = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'login', username, password })
                    });
                    const res = await resp.json();
                    if (res.success) {
                        const userData = { name: res.username, uid: res.uid };
                        setUser(userData);
                        localStorage.setItem('leitner_session', JSON.stringify(userData));
                        await refreshData();
                        setView('dashboard');
                    } else {
                        setError(res.error || "Login fehlgeschlagen.");
                    }
                } catch (e) {
                    setError("Server antwortet nicht.");
                } finally {
                    setLoading(false);
                }
            };

            // Hintergrund-API Call ohne die UI zu blockieren
            const apiPostBackground = async (action, payload, optimisticUpdateFn) => {
                setIsSyncing(true);
                if (optimisticUpdateFn) optimisticUpdateFn();
                
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        body: JSON.stringify({ action, username: user?.name, userUid: user?.uid, ...payload })
                    });
                    // Sync nach Verzögerung
                    setTimeout(() => refreshData(true), 2000);
                } catch (e) {
                    console.error("BG Sync failed", e);
                    setIsSyncing(false);
                }
            };

            useEffect(() => {
                const saved = localStorage.getItem('leitner_session');
                if (saved) {
                    setUser(JSON.parse(saved));
                    setView('dashboard');
                    refreshData();
                }
            }, []);

            return (
                <div className="min-h-screen pb-10">
                    {user && (
                        <nav className="bg-white border-b border-slate-200 sticky top-0 z-50 p-4 shadow-sm flex justify-between items-center h-16">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('dashboard')}>
                                <div className="bg-blue-600 p-1.5 rounded-lg text-white"><Icon name="Layers" size={18}/></div>
                                <span className="font-black text-lg">LEITNER</span>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                {isSyncing && (
                                    <div className="flex items-center gap-2 text-blue-500 text-[10px] font-black uppercase animate-pulse">
                                        <Icon name="RefreshCw" size={12} className="animate-spin" />
                                        <span>Sync...</span>
                                    </div>
                                )}
                                <span className="text-sm font-bold text-slate-600 hidden sm:inline">{user.name}</span>
                                <button onClick={() => { setUser(null); localStorage.removeItem('leitner_session'); setView('auth'); }} className="text-slate-400 hover:text-red-500 transition-colors">
                                    <Icon name="LogOut" size={20}/>
                                </button>
                            </div>
                        </nav>
                    )}

                    <main className="max-w-5xl mx-auto px-4 mt-6">
                        {loading && (
                            <div className="fixed inset-0 bg-white/80 z-[100] flex items-center justify-center">
                                <Icon name="Loader2" className="animate-spin text-blue-600" size={40}/>
                            </div>
                        )}
                        
                        {view === 'auth' && <AuthView onLogin={handleLogin} error={error} />}
                        
                        {view === 'dashboard' && (
                            <div className="animate-in space-y-6">
                                <div className="flex justify-between items-center">
                                    <h1 className="text-3xl font-black">Deine Fächer</h1>
                                    <Button onClick={() => { 
                                        const n = prompt("Name des Fachs:"); 
                                        if(n) apiPostBackground('addLecture', {name: n}, () => {
                                            const newL = { id: 'temp_'+Date.now(), name: n, createdby: user.name };
                                            setLectures(prev => [...prev, newL]);
                                        });
                                    }}><Icon name="Plus" size={18}/> Neu</Button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {lectures.map(l => (
                                        <div key={l.id} className="bg-white p-6 rounded-xl border border-slate-200 cursor-pointer hover:border-blue-400 transition-all shadow-sm group" onClick={() => { setCurrentLecture(l); setView('detail'); }}>
                                            <div className="text-blue-500 mb-2 group-hover:scale-110 transition-transform"><Icon name="BookOpen" /></div>
                                            <h3 className="text-xl font-bold">{l.name || "Unbenannt"}</h3>
                                            <p className="text-[10px] uppercase text-slate-400 mt-2 font-black tracking-widest">Erstellt von {l.createdby || "Unbekannt"}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'detail' && currentLecture && (
                            <LectureDetail 
                                lecture={currentLecture}
                                cards={cards.filter(c => String(c.lectureid || c.lectureId) === String(currentLecture.id))}
                                userProgress={progress.filter(p => String(p.useruid || p.userUid) === String(user.uid))}
                                onBack={() => setView('dashboard')}
                                onAddCard={(q, a) => {
                                    const tempId = 'c_'+Date.now();
                                    apiPostBackground('addCard', { lectureId: currentLecture.id, q, a }, () => {
                                        setCards(prev => [...prev, { id: tempId, lectureid: currentLecture.id, q, a, createdby: user.name, creatoruid: user.uid }]);
                                    });
                                }}
                                onToggleSelect={(cardId, active) => {
                                    apiPostBackground('toggleSelection', { cardId, active }, () => {
                                        setProgress(prev => {
                                            const existing = prev.find(p => String(p.cardid || p.cardId) === String(cardId));
                                            if (existing) return prev.map(p => String(p.cardid || p.cardId) === String(cardId) ? {...p, active} : p);
                                            return [...prev, { cardid: cardId, active, box: 1, useruid: user.uid }];
                                        });
                                    });
                                }}
                                onUpdateBox={(cardId, box) => {
                                    apiPostBackground('updateBox', { cardId, box }, () => {
                                        setProgress(prev => prev.map(p => String(p.cardid || p.cardId) === String(cardId) ? {...p, box} : p));
                                    });
                                }}
                                onDeleteCard={(cardId) => {
                                    apiPostBackground('deleteCard', { cardId }, () => {
                                        setCards(prev => prev.filter(c => String(c.id) !== String(cardId)));
                                    });
                                }}
                                userId={user.uid}
                            />
                        )}
                    </main>
                </div>
            );
        }

        function AuthView({ onLogin, error }) {
            const [name, setName] = useState('');
            const [pass, setPass] = useState('');
            return (
                <div className="max-w-sm mx-auto mt-16 animate-in">
                    <div className="bg-white p-8 rounded-xl shadow-xl border border-slate-100">
                        <div className="flex justify-center mb-4 text-blue-600"><Icon name="UserCircle" size={48} /></div>
                        <h2 className="text-2xl font-black text-center mb-6">Login</h2>
                        <div className="space-y-4">
                            <input type="text" placeholder="Name" className="w-full p-3 border rounded-xl outline-none font-bold" value={name} onChange={e => setName(e.target.value)} />
                            <input type="password" placeholder="Passwort" className="w-full p-3 border rounded-xl outline-none font-bold" value={pass} onChange={e => setPass(e.target.value)} />
                            {error && <p className="text-red-500 text-xs font-bold bg-red-50 p-2 rounded-lg">{error}</p>}
                            <Button className="w-full py-3" onClick={() => onLogin(name, pass)}>Einloggen</Button>
                        </div>
                    </div>
                </div>
            );
        }

        function LectureDetail({ lecture, cards, userProgress, onBack, onAddCard, onToggleSelect, onUpdateBox, onDeleteCard, userId }) {
            const [tab, setTab] = useState('study');
            const [box, setBox] = useState(1);
            const [idx, setIdx] = useState(0);
            const [show, setShow] = useState(false);
            const [newQ, setNewQ] = useState('');
            const [newA, setNewA] = useState('');

            const progMap = useMemo(() => {
                const m = {};
                userProgress.forEach(p => m[String(p.cardid || p.cardId)] = p);
                return m;
            }, [userProgress]);

            const activeCards = cards.filter(c => progMap[String(c.id)]?.active);
            const studyCards = activeCards.filter(c => (progMap[String(c.id)]?.box || 1) === box);

            const handleRate = (ok) => {
                const c = studyCards[idx];
                const curBox = progMap[String(c.id)]?.box || 1;
                onUpdateBox(c.id, ok ? Math.min(curBox + 1, 4) : 1);
                setShow(false);
                if (idx < studyCards.length - 1) setIdx(idx + 1); else setIdx(0);
            };

            const handleAdd = () => {
                if(!newQ || !newA) return;
                onAddCard(newQ, newA);
                setNewQ(''); setNewA('');
                // Fokus zurück auf Frage setzen für schnelles Tippen
                document.getElementById('question-input').focus();
            };

            return (
                <div className="animate-in space-y-6">
                    <div className="flex items-center gap-4">
                        <button onClick={onBack} className="p-2 bg-white border rounded-lg hover:bg-slate-50 transition-colors"><Icon name="ArrowLeft" size={20}/></button>
                        <h2 className="text-2xl font-black">{lecture.name}</h2>
                    </div>
                    
                    <div className="flex bg-slate-200/60 p-1 rounded-xl w-fit">
                        <button onClick={() => setTab('study')} className={`px-5 py-2 rounded-lg font-bold text-sm transition-all ${tab === 'study' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>Lernen</button>
                        <button onClick={() => setTab('pool')} className={`px-5 py-2 rounded-lg font-bold text-sm transition-all ${tab === 'pool' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>Karten-Pool</button>
                    </div>

                    {tab === 'study' ? (
                        <div className="max-w-xl mx-auto space-y-6">
                            <div className="flex gap-2">
                                {[1,2,3,4].map(b => (
                                    <button key={b} onClick={() => {setBox(b); setIdx(0); setShow(false);}} className={`flex-1 p-3 rounded-xl border-2 transition-all ${box === b ? 'border-blue-600 bg-white shadow-lg' : 'opacity-40 bg-slate-100'}`}>
                                        <div className="text-[10px] font-black uppercase text-slate-400">Box {b}</div>
                                        <div className="text-xl font-black">{activeCards.filter(c => (progMap[String(c.id)]?.box || 1) === b).length}</div>
                                    </button>
                                ))}
                            </div>
                            {studyCards.length > 0 ? (
                                <div className="space-y-4">
                                    <div className="bg-white rounded-2xl border border-slate-200 p-10 text-center min-h-[300px] flex flex-col justify-center items-center relative shadow-sm">
                                        <div className="absolute top-4 left-1/2 -translate-x-1/2 text-[10px] font-black text-slate-300 uppercase tracking-widest">Karte {idx + 1} von {studyCards.length}</div>
                                        <div className="text-xs font-black text-slate-300 uppercase mb-4">Frage</div>
                                        <div className="text-2xl font-bold text-slate-800">{studyCards[idx].q}</div>
                                        {show && <div className="mt-8 pt-8 border-t w-full animate-in">
                                            <div className="text-xs font-black text-blue-300 uppercase mb-2">Antwort</div>
                                            <div className="text-2xl font-black text-blue-600">{studyCards[idx].a}</div>
                                        </div>}
                                    </div>
                                    {!show ? <Button className="w-full py-5 text-xl" onClick={() => setShow(true)}>Antwort zeigen</Button> : (
                                        <div className="flex gap-4">
                                            <button onClick={() => handleRate(false)} className="flex-1 bg-red-50 text-red-600 py-4 rounded-xl font-black border-2 border-red-100 hover:bg-red-100 transition-colors">Falsch</button>
                                            <button onClick={() => handleRate(true)} className="flex-1 bg-green-500 text-white py-4 rounded-xl font-black shadow-lg hover:bg-green-600 transition-colors">Richtig</button>
                                        </div>
                                    )}
                                </div>
                            ) : <div className="text-center py-24 text-slate-400 font-bold border-2 border-dashed rounded-[2rem] bg-white">Box {box} ist leer.</div>}
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="bg-white p-6 rounded-xl border border-slate-200 h-fit space-y-4 shadow-sm">
                                <h3 className="font-black text-blue-600 flex items-center gap-2"><Icon name="PlusCircle" size={18}/> Neue Karte</h3>
                                <textarea id="question-input" placeholder="Frage..." className="w-full p-3 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all" rows="3" value={newQ} onChange={e => setNewQ(e.target.value)}/>
                                <textarea placeholder="Antwort..." className="w-full p-3 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all" rows="3" value={newA} onChange={e => setNewA(e.target.value)}/>
                                <Button className="w-full py-3" onClick={handleAdd}>Hinzufügen (Sofort)</Button>
                                <p className="text-[9px] text-slate-400 italic">Karte wird sofort lokal hinzugefügt und im Hintergrund synchronisiert.</p>
                            </div>
                            <div className="md:col-span-2 space-y-3">
                                {cards.map(c => (
                                    <div key={c.id} className={`bg-white p-4 rounded-xl border-l-8 transition-all shadow-sm ${progMap[String(c.id)]?.active ? 'border-l-blue-600' : 'border-l-slate-200 opacity-60'}`}>
                                        <div className="flex justify-between items-start gap-4">
                                            <div className="flex-1">
                                                <div className="font-bold text-slate-800">{c.q}</div>
                                                <div className="text-sm text-slate-400 mt-1 italic">{c.a}</div>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <button 
                                                    className={`px-3 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all border ${progMap[String(c.id)]?.active ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-slate-50 text-slate-400 border-slate-200'}`}
                                                    onClick={() => onToggleSelect(c.id, !progMap[String(c.id)]?.active)}
                                                >
                                                    {progMap[String(c.id)]?.active ? 'Aktiv' : 'Wählen'}
                                                </button>
                                                {(String(c.creatoruid || c.creatorUid) === String(userId)) && (
                                                    <button onClick={() => onDeleteCard(c.id)} className="text-slate-300 hover:text-red-500 transition-colors p-1">
                                                        <Icon name="Trash2" size={18}/>
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
