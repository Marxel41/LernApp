<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitner Sheet - Login & Learn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwsOgO9MCOz1Rmv7m1EVV26nl29H4RS2D4_KqBKCh_HmiZnnbDAu5V1EaxZEwnUzkX9/exec";

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = lucide.createIcons({
                        icons: { [name]: lucide[name] },
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const Card = ({ children, className = "", onClick }) => (
            <div onClick={onClick} className={`bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden ${className}`}>{children}</div>
        );

        const Button = ({ onClick, children, variant = 'primary', className = "", disabled = false, type = "button" }) => {
            const variants = {
                primary: 'bg-blue-600 text-white hover:bg-blue-700 shadow-md',
                secondary: 'bg-slate-200 text-slate-800 hover:bg-slate-300',
                danger: 'bg-red-100 text-red-600 hover:bg-red-200',
                ghost: 'text-slate-500 hover:bg-slate-100'
            };
            return (
                <button type={type} disabled={disabled} onClick={onClick} 
                    className={`px-4 py-2 rounded-lg font-bold transition-all active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2 ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('auth'); 
            const [lectures, setLectures] = useState([]);
            const [cards, setCards] = useState([]);
            const [progress, setProgress] = useState([]);
            const [currentLecture, setCurrentLecture] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const refreshData = async (silent = false) => {
                if (!SCRIPT_URL) return;
                if (!silent) setLoading(true);
                try {
                    const resp = await fetch(SCRIPT_URL);
                    const data = await resp.json();
                    setLectures(data.lectures || []);
                    setCards(data.cards || []);
                    setProgress(data.progress || []);
                } catch (e) {
                    console.error("Fetch error:", e);
                    setError("Daten konnten nicht geladen werden.");
                } finally {
                    setLoading(false);
                }
            };

            const handleLogin = async (username, password) => {
                setError('');
                setLoading(true);
                try {
                    const resp = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'login', username, password })
                    });
                    const res = await resp.json();
                    if (res.success) {
                        const userData = { name: res.username, uid: res.uid };
                        setUser(userData);
                        localStorage.setItem('leitner_session', JSON.stringify(userData));
                        await refreshData();
                        setView('dashboard');
                    } else {
                        setError(res.error || "Login fehlgeschlagen.");
                    }
                } catch (e) {
                    setError("Verbindung zum Server fehlgeschlagen.");
                } finally {
                    setLoading(false);
                }
            };

            const apiPost = async (action, payload) => {
                setLoading(true);
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        body: JSON.stringify({ action, username: user?.name, userUid: user?.uid, ...payload })
                    });
                    setTimeout(() => refreshData(true), 1000);
                } catch (e) {
                    setError("Fehler beim Speichern.");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                const saved = localStorage.getItem('leitner_session');
                if (saved) {
                    setUser(JSON.parse(saved));
                    setView('dashboard');
                    refreshData();
                }
            }, []);

            return (
                <div className="min-h-screen pb-10">
                    {user && (
                        <nav className="bg-white border-b border-slate-200 sticky top-0 z-50 p-4 shadow-sm flex justify-between items-center">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('dashboard')}>
                                <div className="bg-blue-600 p-1.5 rounded-lg text-white"><Icon name="Layers" size={18}/></div>
                                <span className="font-black text-lg">LEITNER</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-sm font-bold text-slate-600 hidden sm:inline">{user.name}</span>
                                <button onClick={() => { setUser(null); localStorage.removeItem('leitner_session'); setView('auth'); }} className="text-slate-400 hover:text-red-500 transition-colors">
                                    <Icon name="LogOut" size={20}/>
                                </button>
                            </div>
                        </nav>
                    )}

                    <main className="max-w-5xl mx-auto px-4 mt-6">
                        {loading && <div className="fixed inset-0 bg-white/50 backdrop-blur-[2px] z-[100] flex items-center justify-center"><Icon name="RefreshCw" className="animate-spin text-blue-600" size={40}/></div>}
                        
                        {view === 'auth' && <AuthView onLogin={handleLogin} error={error} />}
                        
                        {view === 'dashboard' && (
                            <div className="animate-in space-y-6">
                                <div className="flex justify-between items-center">
                                    <h1 className="text-3xl font-black">Deine Fächer</h1>
                                    <Button onClick={() => { 
                                        const n = prompt("Name des Fachs:"); 
                                        if(n) apiPost('addLecture', {name: n});
                                    }}><Icon name="Plus" size={18}/> Neu</Button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {lectures.map(l => (
                                        <Card key={l.id} className="p-6 cursor-pointer hover:border-blue-400 transition-all" onClick={() => { setCurrentLecture(l); setView('detail'); }}>
                                            <Icon name="BookOpen" className="text-blue-500 mb-2" />
                                            <h3 className="text-xl font-bold">{l.name || "Unbenannt"}</h3>
                                            <p className="text-[10px] uppercase text-slate-400 mt-2 font-bold tracking-widest">Erstellt von {l.createdBy || "Unbekannt"}</p>
                                        </Card>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'detail' && currentLecture && (
                            <LectureDetail 
                                lecture={currentLecture}
                                cards={cards.filter(c => c.lectureId === currentLecture.id)}
                                userProgress={progress.filter(p => p.userUid === user.uid)}
                                onBack={() => setView('dashboard')}
                                onAddCard={(q, a) => apiPost('addCard', { lectureId: currentLecture.id, q, a })}
                                onToggleSelect={(cardId, active) => apiPost('toggleSelection', { cardId, active })}
                                onUpdateBox={(cardId, box) => apiPost('updateBox', { cardId, box })}
                                onDeleteCard={(cardId) => apiPost('deleteCard', { cardId })}
                                userId={user.uid}
                            />
                        )}
                    </main>
                </div>
            );
        }

        function AuthView({ onLogin, error }) {
            const [name, setName] = useState('');
            const [pass, setPass] = useState('');
            return (
                <div className="max-w-sm mx-auto mt-20 animate-in">
                    <Card className="p-8 shadow-xl border-0">
                        <h2 className="text-2xl font-black text-center mb-6">Anmelden</h2>
                        <div className="space-y-4">
                            <input type="text" placeholder="Benutzername" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" value={name} onChange={e => setName(e.target.value)} />
                            <input type="password" placeholder="Passwort" className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold" value={pass} onChange={e => setPass(e.target.value)} />
                            {error && <p className="text-red-500 text-xs font-bold">{error}</p>}
                            <Button className="w-full py-3" onClick={() => onLogin(name, pass)}>Einloggen</Button>
                        </div>
                    </Card>
                </div>
            );
        }

        function LectureDetail({ lecture, cards, userProgress, onBack, onAddCard, onToggleSelect, onUpdateBox, onDeleteCard, userId }) {
            const [tab, setTab] = useState('study');
            const [box, setBox] = useState(1);
            const [idx, setIdx] = useState(0);
            const [show, setShow] = useState(false);
            const [newQ, setNewQ] = useState('');
            const [newA, setNewA] = useState('');

            const progMap = useMemo(() => {
                const m = {};
                userProgress.forEach(p => m[p.cardId] = p);
                return m;
            }, [userProgress]);

            const activeCards = cards.filter(c => progMap[c.id]?.active);
            const studyCards = activeCards.filter(c => (progMap[c.id]?.box || 1) === box);

            const handleRate = (ok) => {
                const c = studyCards[idx];
                const curBox = progMap[c.id]?.box || 1;
                onUpdateBox(c.id, ok ? Math.min(curBox + 1, 4) : 1);
                setShow(false);
                if (idx < studyCards.length - 1) setIdx(idx + 1); else setIdx(0);
            };

            return (
                <div className="animate-in space-y-6">
                    <div className="flex items-center gap-4">
                        <button onClick={onBack} className="p-2 bg-white border rounded-lg hover:bg-slate-50"><Icon name="ArrowLeft" size={20}/></button>
                        <h2 className="text-2xl font-black">{lecture.name}</h2>
                    </div>
                    
                    <div className="flex bg-slate-200/50 p-1 rounded-xl w-fit">
                        <button onClick={() => setTab('study')} className={`px-4 py-1.5 rounded-lg font-bold text-sm ${tab === 'study' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>Lernen</button>
                        <button onClick={() => setTab('pool')} className={`px-4 py-1.5 rounded-lg font-bold text-sm ${tab === 'pool' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>Karten-Pool</button>
                    </div>

                    {tab === 'study' ? (
                        <div className="max-w-xl mx-auto space-y-6">
                            <div className="flex gap-2">
                                {[1,2,3,4].map(b => (
                                    <button key={b} onClick={() => {setBox(b); setIdx(0); setShow(false);}} className={`flex-1 p-3 rounded-xl border-2 transition-all ${box === b ? 'border-blue-600 bg-white shadow-lg' : 'opacity-40 grayscale'}`}>
                                        <div className="text-[10px] font-black uppercase text-slate-400">Box {b}</div>
                                        <div className="text-xl font-black">{activeCards.filter(c => (progMap[c.id]?.box || 1) === b).length}</div>
                                    </button>
                                ))}
                            </div>
                            {studyCards.length > 0 ? (
                                <div className="space-y-4">
                                    <Card className="p-10 text-center min-h-[250px] flex flex-col justify-center items-center">
                                        <div className="text-xs font-black text-slate-300 uppercase mb-4">Frage</div>
                                        <div className="text-xl font-bold">{studyCards[idx].q}</div>
                                        {show && <div className="mt-6 pt-6 border-t w-full animate-in">
                                            <div className="text-xs font-black text-blue-300 uppercase mb-2">Antwort</div>
                                            <div className="text-xl font-black text-blue-600">{studyCards[idx].a}</div>
                                        </div>}
                                    </Card>
                                    {!show ? <Button className="w-full py-4 text-lg" onClick={() => setShow(true)}>Antwort zeigen</Button> : (
                                        <div className="flex gap-4">
                                            <button onClick={() => handleRate(false)} className="flex-1 bg-red-50 text-red-600 py-4 rounded-xl font-black border border-red-100">Falsch</button>
                                            <button onClick={() => handleRate(true)} className="flex-1 bg-green-500 text-white py-4 rounded-xl font-black shadow-lg">Richtig</button>
                                        </div>
                                    )}
                                </div>
                            ) : <div className="text-center py-20 text-slate-400 font-bold border-2 border-dashed rounded-3xl">Diese Box ist leer.</div>}
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <Card className="p-6 h-fit space-y-4">
                                <h3 className="font-black text-blue-600">Neue Karte</h3>
                                <textarea placeholder="Frage..." className="w-full p-3 border rounded-xl text-sm" rows="3" value={newQ} onChange={e => setNewQ(e.target.value)}/>
                                <textarea placeholder="Antwort..." className="w-full p-3 border rounded-xl text-sm" rows="3" value={newA} onChange={e => setNewA(e.target.value)}/>
                                <Button className="w-full" onClick={() => { onAddCard(newQ, newA); setNewQ(''); setNewA(''); }}>Speichern</Button>
                            </Card>
                            <div className="md:col-span-2 space-y-3">
                                {cards.map(c => (
                                    <Card key={c.id} className={`p-4 border-l-4 ${progMap[c.id]?.active ? 'border-l-blue-600' : 'border-l-slate-200'}`}>
                                        <div className="flex justify-between items-start gap-4">
                                            <div>
                                                <div className="font-bold">{c.q}</div>
                                                <div className="text-sm text-slate-400 mt-1">{c.a}</div>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <Button variant={progMap[c.id]?.active ? 'primary' : 'secondary'} className="text-[10px] px-2 py-1" onClick={() => onToggleSelect(c.id, !progMap[c.id]?.active)}>
                                                    {progMap[c.id]?.active ? 'Aktiv' : 'Wählen'}
                                                </Button>
                                                {c.creatorUid === userId && <button onClick={() => onDeleteCard(c.id)} className="text-slate-300 hover:text-red-500"><Icon name="Trash2" size={16}/></button>}
                                            </div>
                                        </div>
                                    </Card>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
